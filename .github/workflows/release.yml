name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="Protokoll"
          BUNDLE_ID="com.redaksjon.protokoll"
          VERSION="${{ github.event.release.tag_name }}"
          
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          
          echo "📦 Creating app bundle for version ${VERSION}..."
          
          # Create app bundle structure
          APP_DIR="${APP_NAME}.app"
          rm -rf "$APP_DIR"
          
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          
          # Copy executable
          cp .build/release/Protokoll "$APP_DIR/Contents/MacOS/${APP_NAME}"
          
          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>${BUNDLE_ID}</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.productivity</string>
          </dict>
          </plist>
          EOF
          
          # Make executable
          chmod +x "$APP_DIR/Contents/MacOS/${APP_NAME}"
          
          echo "✅ App bundle created: ${APP_DIR}"

      - name: Install signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="${RUNNER_TEMP}/developer_id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "${DEVELOPER_ID_CERT_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${DEVELOPER_ID_CERT_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

      - name: Code sign app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_NAME="Protokoll"
          APP_DIR="${APP_NAME}.app"
          IDENTITY="$(security find-identity -v -p codesigning | awk -F\" '/Developer ID Application/ && $0 ~ ENVIRON["APPLE_TEAM_ID"] {print $2; exit}')"

          if [ -z "${IDENTITY}" ]; then
            echo "❌ Could not find Developer ID Application identity for team ${APPLE_TEAM_ID}"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "🔏 Signing app bundle with: ${IDENTITY}"
          codesign --force --deep --options runtime --sign "${IDENTITY}" "${APP_DIR}"

          echo "✅ App bundle signed"
          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"
          spctl --assess --type execute --verbose=4 "${APP_DIR}"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_NAME="Protokoll"
          APP_DIR="${APP_NAME}.app"
          NOTARY_ZIP="${APP_NAME}-notary.zip"

          ditto -c -k --keepParent "${APP_DIR}" "${NOTARY_ZIP}"

          xcrun notarytool submit "${NOTARY_ZIP}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

          xcrun stapler staple "${APP_DIR}"
          xcrun stapler validate "${APP_DIR}"

      - name: Create ZIP archive
        run: |
          APP_NAME="Protokoll"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="Protokoll-${VERSION}-macOS.zip"
          
          ditto -c -k --keepParent "${APP_NAME}.app" "$ZIP_NAME"
          echo "✅ Created archive: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Create checksum
        run: |
          ZIP_FILE="$(ls Protokoll-*-macOS.zip | head -n 1)"
          shasum -a 256 "$ZIP_FILE" > "${ZIP_FILE}.sha256"
          echo "✅ Created checksum:"
          cat "${ZIP_FILE}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Protokoll-*-macOS.zip
            Protokoll-*-macOS.zip.sha256
          body: |
            ## Installation
            
            1. Download `Protokoll-<version>-macOS.zip`
            2. Unzip the file
            3. Open `Protokoll.app`
            
            > **Note**: This app is Developer ID signed and notarized for a smooth macOS launch experience.
            
            ## What's Changed
            
            See the commit history for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          if [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
