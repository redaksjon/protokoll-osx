name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="Protokoll"
          BUNDLE_ID="com.redaksjon.protokoll"
          VERSION="${{ github.event.release.tag_name }}"
          
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          
          echo "📦 Creating app bundle for version ${VERSION}..."
          
          # Create app bundle structure
          APP_DIR="${APP_NAME}.app"
          rm -rf "$APP_DIR"
          
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          
          # Copy executable
          cp .build/release/Protokoll "$APP_DIR/Contents/MacOS/${APP_NAME}"
          
          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>${BUNDLE_ID}</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.productivity</string>
          </dict>
          </plist>
          EOF
          
          # Make executable
          chmod +x "$APP_DIR/Contents/MacOS/${APP_NAME}"
          
          echo "✅ App bundle created: ${APP_DIR}"

      # Single step: decode p12, import into temp keychain, resolve identity, codesign.
      # (Split steps can miss keychain context; macOS base64 uses -D, not GNU --decode.)
      - name: Import certificate and code sign app bundle
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Optional: full identity string from `security find-identity -v -p codesigning`, e.g.
          # Developer ID Application: My Company (XXXXXXXXXX)
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          APP_NAME="Protokoll"
          APP_DIR="${APP_NAME}.app"
          CERT_PATH="${RUNNER_TEMP}/developer_id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "${DEVELOPER_ID_CERT_BASE64}" | base64 -D > "${CERT_PATH}" 2>/dev/null || \
            printf '%s' "${DEVELOPER_ID_CERT_BASE64}" | base64 --decode > "${CERT_PATH}"

          if [ ! -s "${CERT_PATH}" ]; then
            echo "❌ Decoded .p12 is empty. Re-encode with: base64 -i Certificates.p12 | pbcopy"
            echo "   (one line, no extra newlines in the GitHub secret)"
            exit 1
          fi

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${DEVELOPER_ID_CERT_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}" || \
            security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"

          echo "Identities available for codesigning (this keychain only):"
          IDENTITY_DUMP="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" 2>&1)" || true
          echo "${IDENTITY_DUMP}"

          # Count identities that include a private key (what codesign needs)
          DEV_ID_COUNT="$(printf '%s\n' "${IDENTITY_DUMP}" | grep -c 'Developer ID Application' || true)"
          if [ "${DEV_ID_COUNT}" -eq 0 ]; then
            echo ""
            echo "❌ 0 code-signing identities after importing the .p12."
            echo "   Setting CODESIGN_IDENTITY in GitHub cannot fix this — the private key must be inside the .p12."
            echo ""
            echo "   Fix on Mac (Keychain Access):"
            echo "   1) Open 'login' keychain → Certificates."
            echo "   2) Find 'Developer ID Application: …' (not 'Apple Distribution')."
            echo "   3) Expand it — there must be a private key under it."
            echo "   4) Right-click the **private key** (or the certificate+key) → Export → .p12 with a password."
            echo "   5) Re-base64: base64 -i Your.p12 | pbcopy → update DEVELOPER_ID_CERT_BASE64"
            echo ""
            echo "   Also verify DEVELOPER_ID_CERT_PASSWORD matches the export password."
            exit 1
          fi

          TEAM_TRIM="$(printf '%s' "${APPLE_TEAM_ID}" | tr -d '[:space:]')"

          if [ -n "${CODESIGN_IDENTITY:-}" ]; then
            if ! printf '%s\n' "${IDENTITY_DUMP}" | grep -Fq "${CODESIGN_IDENTITY}"; then
              echo "❌ Secret CODESIGN_IDENTITY does not match any identity in the keychain after import."
              echo "   Copy the exact line from 'security find-identity -v -p codesigning' on a Mac that has the cert, or remove the secret to auto-pick."
              exit 1
            fi
            IDENTITY="${CODESIGN_IDENTITY}"
          else
            IDENTITY="$(
              printf '%s\n' "${IDENTITY_DUMP}" | awk -v tid="${TEAM_TRIM}" -F'"' '
                /Developer ID Application/ {
                  if (tid != "" && index($0, tid) > 0) { print $2; exit }
                  if (tid == "") { print $2; exit }
                }
              '
            )"
            if [ -z "${IDENTITY}" ] && [ -n "${TEAM_TRIM}" ]; then
              IDENTITY="$(
                printf '%s\n' "${IDENTITY_DUMP}" | awk -F'"' '/Developer ID Application/ { print $2; exit }'
              )"
            fi
          fi

          if [ -z "${IDENTITY}" ]; then
            echo "❌ No Developer ID Application identity matched (check APPLE_TEAM_ID matches cert)."
            exit 1
          fi

          echo "🔏 Signing app bundle with: ${IDENTITY}"
          codesign --force --deep --options runtime --sign "${IDENTITY}" "${APP_DIR}"

          echo "✅ App bundle signed"
          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"
          # Do NOT run spctl here: Developer ID + hardened runtime is "unnotarized" until
          # notarytool + stapler — Gatekeeper assessment belongs after staple (see next step).

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_NAME="Protokoll"
          APP_DIR="${APP_NAME}.app"
          NOTARY_ZIP="${APP_NAME}-notary.zip"

          ditto -c -k --keepParent "${APP_DIR}" "${NOTARY_ZIP}"

          xcrun notarytool submit "${NOTARY_ZIP}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

          xcrun stapler staple "${APP_DIR}"
          xcrun stapler validate "${APP_DIR}"

          echo "Gatekeeper check (expects acceptance after notarization + staple):"
          spctl --assess --type execute --verbose=4 "${APP_DIR}"

      - name: Create ZIP archive
        run: |
          APP_NAME="Protokoll"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="Protokoll-${VERSION}-macOS.zip"
          
          ditto -c -k --keepParent "${APP_NAME}.app" "$ZIP_NAME"
          echo "✅ Created archive: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Create checksum
        run: |
          ZIP_FILE="$(ls Protokoll-*-macOS.zip | head -n 1)"
          shasum -a 256 "$ZIP_FILE" > "${ZIP_FILE}.sha256"
          echo "✅ Created checksum:"
          cat "${ZIP_FILE}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Protokoll-*-macOS.zip
            Protokoll-*-macOS.zip.sha256
          body: |
            ## Installation
            
            1. Download `Protokoll-<version>-macOS.zip`
            2. Unzip the file
            3. Open `Protokoll.app`
            
            > **Note**: This app is Developer ID signed and notarized for a smooth macOS launch experience.
            
            ## What's Changed
            
            See the commit history for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          if [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
